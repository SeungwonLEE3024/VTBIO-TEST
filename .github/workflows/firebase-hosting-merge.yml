name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 최신 버전(v4)으로 업데이트된 Checkout 액션
      - uses: actions/checkout@v4

      # 2. 빌드 및 배포 단계
      - run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_VTBIO_TEST }}
          channelId: live
          projectId: vtbio-test