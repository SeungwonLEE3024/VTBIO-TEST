    <!--
      텍스트 폰트 (Noto Serif · Manrope) — 비차단 로딩
      rel=preload + onload 패턴: 렌더링 차단 없이 백그라운드에서 다운로드.
      display=swap: 폰트 로드 전 시스템 폰트로 텍스트 즉시 표시.
    -->
    <link
      rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap" />
    </noscript>

    <!--
      Material Symbols — 비차단 로딩 + 아이콘 24개만 요청
      icon_names 파라미터: 전체 variable font(3.8MB) → 사용 아이콘만(~50KB)
      display=block: 아이콘 폰트 로드 전 빈 공간 유지 (CLS 방지)
    -->
    <link
      rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined&icon_names=add_a_photo,arrow_back,arrow_forward,auto_awesome,auto_fix_high,check_circle,delete,edit,info,lock,lock_reset,logout,mail,manage_accounts,mark_email_read,person,photo_camera,psychology,science,shopping_bag,spa,visibility,visibility_off,warning&display=block"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
